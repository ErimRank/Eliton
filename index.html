<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><script>localStorage.setItem("ENV","DEV");localStorage.setItem("CONFIG","CONFIG");</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Builder</title>
</head>
<body></body>
<script type="module">
    const ROUTEJS=(NAME)=>{
        const code = localStorage.getItem(NAME);
        if (code) {
            const script = document.createElement("script");
            script.type = "text/javascript";
            script.textContent = code;
            script.defer=true;
            document.head.appendChild(script);
        };
    };
    const ROUTECSS=(NAME)=>{
        const css = localStorage.getItem(NAME);
        if (css) {
            const style = document.createElement("style");
            style.type = "text/css";
            style.textContent = css;
            document.head.appendChild(style);
        };
    };
    if (localStorage.getItem("UPDATES")) {
        ROUTEJS("ELITION");ELITE();
    } else { 
        if (localStorage.getItem("ENV") === "DEV" ) {
            const { CONNECTION } = await import("./index.js");
            CONNECTION();
        } else {
            if (navigator.onLine) {
                const { CONNECTION } = await import("https://erimrank.github.io/Eliton/index.js");
                CONNECTION();
            } else {
                const BODY=document.querySelector("body");
            };
        };
    };
</script>
</html>
